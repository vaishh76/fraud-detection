<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('/static/images/Fraud.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* Center */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass box */
.content {
    background: rgba(0, 0, 0, 0.6);
    padding: 50px;
    border-radius: 12px;
    color: white;
    text-align: center;
    backdrop-filter: blur(8px);

    animation: fadeIn 1.5s ease-in-out;
}

/* Fade animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Button */
button {
    padding: 12px 25px;
    font-size: 16px;
    background: #00c6ff;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
    transform: scale(1.05);
    box-shadow: 0 0 10px #00c6ff;
}
</style>

</head>

<body>

<div class="container">
    <div class="content">
        <h1>💳 Online Fraud Detection System</h1>
        <p>Secure your transactions using AI</p>

        <a href="/predict">
            <button>Start Prediction</button>
        </a>
    </div>
</div>

</body>
</html>
